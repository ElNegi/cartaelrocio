<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bar El Rocío - Panel de Gestión</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d0d0d; --card: #141414; --gold: #c5a880; --border: #262626; --green: #2e7d32; --orange: #ef6c00; --red: #c62828; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; padding-bottom: 50px; }
        
        /* Filtro */
        .filter-container { padding: 20px; max-width: 1400px; margin: 0 auto; }
        .date-input { background: var(--card); color: white; padding: 10px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }

        /* Grid igual que al principio */
        .grid-pedidos { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
        
        .pedido-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 20px; display: flex; flex-direction: column; min-height: 380px; }
        .titulo-seccion { color: var(--gold); font-family: 'Oswald'; border-bottom: 1px solid #333; margin: 10px 0 5px; font-size: 0.8rem; text-transform: uppercase; }
        .item { font-size: 0.9rem; padding: 3px 0; }
        
        .acciones { margin-top: auto; display: flex; gap: 5px; padding-top: 15px; }
        button { flex: 1; border: none; padding: 10px; font-family: 'Oswald'; cursor: pointer; border-radius: 4px; text-transform: uppercase; color: white; }
    </style>
</head>
<body>

    <div class="filter-container">
        <input type="date" id="fecha-filtro" class="date-input">
    </div>

    <main class="grid-pedidos" id="contenedor-pedidos"></main>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyA_JYPuZknSIgsBC_WmVKvvREzN5TnNXdk", projectId: "carta-el-rocio" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById("fecha-filtro").valueAsDate = new Date();
        document.getElementById("fecha-filtro").addEventListener("change", e => cargar(e.target.value));

        function cargar(fecha) {
            const start = new Date(fecha + "T00:00:00").toISOString();
            const end = new Date(fecha + "T23:59:59").toISOString();

            db.collection("pedidos").where("fecha", ">=", start).where("fecha", "<=", end).orderBy("fecha", "desc").onSnapshot(snap => {
                const cont = document.getElementById("contenedor-pedidos");
                cont.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const id = doc.id;
                    const items = [...d.tacos, ...d.extras];
                    
                    // Separación real comida/bebida
                    const bebidas = items.filter(i => /Cola|Café|Zumo|Cerveza|Carajillo|Sherry|Tequila/i.test(i));
                    const comida = items.filter(i => !/Cola|Café|Zumo|Cerveza|Carajillo|Sherry|Tequila/i.test(i));

                    cont.insertAdjacentHTML("beforeend", `
                        <div class="pedido-card">
                            <h3 style="color:var(--gold)">📍 ${d.mesa}</h3>
                            <div class="titulo-seccion">Comida</div>
                            ${comida.map(i => `<div class="item">• ${i}</div>`).join('')}
                            <div class="titulo-seccion">Bebida</div>
                            ${bebidas.map(i => `<div class="item">• ${i}</div>`).join('')}
                            
                            <div class="acciones">
                                ${d.estado === 'pendiente' ? `<button style="background:var(--orange)" onclick="upd('${id}', 'listo')">LISTO</button>` : 
                                  d.estado === 'listo' ? `<button style="background:var(--green)" onclick="upd('${id}', 'pagado')">PAGADO</button>` : 
                                  `<span style="color:var(--green); text-align:center; width:100%; font-weight:bold">✓ PAGADO</span>`}
                                <button style="background:var(--red)" onclick="borrar('${id}')">X</button>
                            </div>
                        </div>`);
                });
            });
        }

        function upd(id, est) { db.collection("pedidos").doc(id).update({estado: est}); }
        function borrar(id) { if(confirm("¿Borrar?")) db.collection("pedidos").doc(id).delete(); }

        cargar(document.getElementById("fecha-filtro").value);
    </script>
</body>
</html>
