<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bar El Rocío - Gestión Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0d0d0d; --card: #141414; --gold: #c5a880; --green: #2e7d32; --orange: #ef6c00; --blue: #1565c0; }
        body { background: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; margin: 0; }
        
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; align-items: start; }
        .columna { background: #080808; border-radius: 8px; padding: 15px; min-height: 80vh; }
        .columna h2 { color: var(--gold); text-align: center; margin-bottom: 15px; font-family: 'Oswald'; }

        .pedido-card { background: var(--card); border-left: 4px solid var(--gold); padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .seccion-item { font-size: 0.85rem; margin-bottom: 5px; }
        .titulo-seccion { color: var(--gold); font-weight: bold; border-bottom: 1px solid #333; margin: 10px 0 5px; display: block; }
        
        .acciones { display: flex; gap: 5px; margin-top: 10px; }
        button { flex: 1; border: none; padding: 8px; cursor: pointer; color: white; border-radius: 3px; font-family: 'Oswald'; }
    </style>
</head>
<body>

    <div style="padding: 20px;">
        <input type="date" id="fecha-filtro" style="padding: 10px; background: var(--card); color: white; border: 1px solid #333;">
    </div>

    <div class="dashboard">
        <div class="columna"><h2 id="col-pendientes">PENDIENTES</h2><div id="list-pendiente"></div></div>
        <div class="columna"><h2 id="col-listos">LISTOS (PARA COBRAR)</h2><div id="list-listo"></div></div>
        <div class="columna"><h2 id="col-pagados">PAGADOS</h2><div id="list-pagado"></div></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const db = firebase.initializeApp({apiKey: "AIzaSyA_JYPuZknSIgsBC_WmVKvvREzN5TnNXdk", projectId: "carta-el-rocio"}).firestore();
        
        document.getElementById("fecha-filtro").valueAsDate = new Date();
        document.getElementById("fecha-filtro").addEventListener("change", e => cargarPedidos(e.target.value));

        function cargarPedidos(fecha) {
            const start = new Date(fecha + "T00:00:00").toISOString();
            const end = new Date(fecha + "T23:59:59").toISOString();

            db.collection("pedidos").where("fecha", ">=", start).where("fecha", "<=", end).onSnapshot(snap => {
                document.querySelectorAll('.columna > div').forEach(d => d.innerHTML = "");
                snap.forEach(doc => {
                    const d = doc.data();
                    const id = doc.id;
                    
                    // Lógica de separación Comida/Bebida
                    const bebidas = [...d.tacos, ...d.extras].filter(item => /Cola|Café|Zumo|Cerveza|Carajillo|Sherry|Tequila/i.test(item));
                    const comida = [...d.tacos, ...d.extras].filter(item => !/Cola|Café|Zumo|Cerveza|Carajillo|Sherry|Tequila/i.test(item));

                    const html = `
                        <div class="pedido-card">
                            <div style="font-weight:bold; color:var(--gold)">📍 ${d.mesa}</div>
                            <span class="titulo-seccion">COMIDA</span>
                            ${comida.map(i => `<div class="seccion-item">• ${i}</div>`).join('')}
                            <span class="titulo-seccion">BEBIDA</span>
                            ${bebidas.map(i => `<div class="seccion-item">• ${i}</div>`).join('')}
                            <div class="acciones">
                                ${d.estado === 'pendiente' ? `<button style="background:var(--orange)" onclick="upd('${id}', 'listo')">LISTO</button>` : ''}
                                ${d.estado === 'listo' ? `<button style="background:var(--green)" onclick="upd('${id}', 'pagado')">PAGAR</button>` : ''}
                                <button style="background:var(--blue)" onclick="upd('${id}', 'pendiente')">RESET</button>
                            </div>
                        </div>`;
                    document.getElementById('list-' + (d.estado || 'pendiente')).insertAdjacentHTML('beforeend', html);
                });
            });
        }

        function upd(id, est) { db.collection("pedidos").doc(id).update({estado: est}); }
        cargarPedidos(document.getElementById("fecha-filtro").value);
    </script>
</body>
</html>
