<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar El Rocío - Gestión Pedidos</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #141414;
            --accent-gold: #c5a880;
            --text-light: #ffffff;
            --border-color: #262626;
            --green: #2e7d32;
            --orange: #ef6c00;
            --red: #c62828;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-light); font-family: 'Montserrat', sans-serif; min-height: 100vh; padding-bottom: 50px; }

        header { background: #080808; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .header-title { font-family: 'Oswald', sans-serif; font-size: 1.5rem; color: var(--accent-gold); text-transform: uppercase; }
        
        .filter-container { max-width: 1400px; margin: 20px auto; padding: 0 20px; display: flex; align-items: center; gap: 10px; }
        .date-picker { background: var(--card-bg); border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 5px; }

        .grid-pedidos { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }

        .pedido-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; display: flex; flex-direction: column; min-height: 380px; }
        .pedido-header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 15px; }
        .pedido-header h3 { color: var(--accent-gold); font-family: 'Oswald', sans-serif; }
        
        .pedido-articulos { flex-grow: 1; overflow-y: auto; font-size: 0.95rem; }
        .pedido-articulos ul { list-style: none; }
        .pedido-articulos li { padding: 5px 0; border-bottom: 1px solid #1a1a1a; }

        .pedido-footer { border-top: 1px solid var(--border-color); padding-top: 15px; }
        .total-pedido { font-family: 'Oswald', sans-serif; font-size: 1.2rem; margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        .acciones-btn { display: flex; gap: 10px; }
        .btn-accion { flex: 1; border: none; padding: 10px; font-family: 'Oswald', sans-serif; color: white; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
        .btn-eliminar { background: var(--red); }
    </style>
</head>
<body>

    <header>
        <div class="header-title">Panel de Control - Pedidos</div>
        <a href="index.html" style="color:var(--text-light); text-decoration:none;"><i class="fa-solid fa-house"></i></a>
    </header>

    <div class="filter-container">
        <label><i class="fa-solid fa-calendar"></i> Fecha:</label>
        <input type="date" id="fecha-filtro" class="date-picker">
    </div>

    <main class="grid-pedidos" id="contenedor-pedidos"></main>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyA_JYPuZknSIgsBC_WmVKvvREzN5TnNXdk", authDomain: "carta-el-rocio.firebaseapp.com", projectId: "carta-el-rocio", storageBucket: "carta-el-rocio.appspot.com", messagingSenderId: "41452655565", appId: "1:41452655565:web:29efb05a1e9185cc49ea84" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let unsubscribe = null;

        document.getElementById("fecha-filtro").valueAsDate = new Date();
        document.getElementById("fecha-filtro").addEventListener("change", (e) => cargarPedidos(e.target.value));

        function cargarPedidos(fecha) {
            if (unsubscribe) unsubscribe();
            const start = new Date(fecha + "T00:00:00").toISOString();
            const end = new Date(fecha + "T23:59:59").toISOString();

            unsubscribe = db.collection("pedidos").where("fecha", ">=", start).where("fecha", "<=", end).orderBy("fecha", "desc").onSnapshot(snap => {
                const cont = document.getElementById("contenedor-pedidos");
                cont.innerHTML = "";
                snap.forEach(doc => {
                    const d = doc.data();
                    const id = doc.id;
                    let botones = "";
                    
                    if (d.estado === "pendiente") botones = `<button onclick="actualizar('${id}', 'listo')" class="btn-accion" style="background:var(--orange)">Listo</button>`;
                    else if (d.estado === "listo") botones = `<button onclick="actualizar('${id}', 'pagado')" class="btn-accion" style="background:var(--green)">Pagado</button>`;
                    else botones = `<span style="color:var(--green); font-weight:bold; margin:auto;"><i class="fa-solid fa-check-circle"></i> PAGADO</span>`;

                    cont.insertAdjacentHTML("beforeend", `
                        <div class="pedido-card">
                            <div class="pedido-header"><h3>📍 ${d.mesa}</h3><span>${new Date(d.fecha).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span></div>
                            <div class="pedido-articulos"><ul>${d.tacos.map(t=>`<li>${t}</li>`).join('')}${d.extras.map(e=>`<li>${e}</li>`).join('')}</ul></div>
                            <div class="pedido-footer">
                                <div class="total-pedido"><span>TOTAL:</span><span>¥${d.total}</span></div>
                                <div class="acciones-btn">${botones}<button onclick="borrar('${id}')" class="btn-accion btn-eliminar"><i class="fa-solid fa-trash"></i></button></div>
                            </div>
                        </div>
                    `);
                });
            });
        }

        function actualizar(id, est) { db.collection("pedidos").doc(id).update({estado: est}); }
        function borrar(id) { if(confirm("¿Borrar pedido?")) db.collection("pedidos").doc(id).delete(); }

        cargarPedidos(document.getElementById("fecha-filtro").value);
    </script>
</body>
</html>
